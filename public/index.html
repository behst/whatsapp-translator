<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beast Mode Translator</title>
  <style>
    :root {
      --bg-app: #f0f4fa;
      --bg-card: #ffffff;
      --bg-header: #185FA5;
      --bg-header-dark: #0C447C;
      --bg-bubble-in: #ffffff;
      --bg-bubble-out: #185FA5;
      --bg-input-bar: #ffffff;
      --bg-input: #f0f4fa;
      --text-primary: #0f1e3d;
      --text-secondary: #6b7c93;
      --text-timestamp: #9ab0c8;
      --text-bubble-out: #ffffff;
      --text-bubble-out-original: #B5D4F4;
      --text-bubble-in-translation: #0f1e3d;
      --text-bubble-in-original: #4a6a93;
      --border: #ccd9ec;
      --accent: #378ADD;
      --accent-dark: #185FA5;
      --avatar-alt: #0C447C;
      --row-hover: #f7f9fc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-app: #0f1e3d;
        --bg-card: #1a3060;
        --bg-header: #1a3060;
        --bg-header-dark: #0a1628;
        --bg-bubble-in: #1a3060;
        --bg-bubble-out: #185FA5;
        --bg-input-bar: #0a1628;
        --bg-input: #1a3060;
        --text-primary: #ffffff;
        --text-secondary: #7a9cc0;
        --text-timestamp: #4a6a8a;
        --text-bubble-out: #ffffff;
        --text-bubble-out-original: #B5D4F4;
        --text-bubble-in-translation: #ffffff;
        --text-bubble-in-original: #85B7EB;
        --border: #243d6a;
        --accent: #378ADD;
        --accent-dark: #185FA5;
        --avatar-alt: #0C447C;
        --row-hover: #162545;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: Arial, sans-serif; background: var(--bg-app); display: flex; flex-direction: column; overflow: hidden; height: 100dvh; }
    .view { display: none; flex-direction: column; overflow: hidden; height: 100dvh; }
    .view.active { display: flex; }
    .app-header { background: var(--bg-header); color: white; padding: 12px 16px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
    .app-header h1 { font-size: 18px; flex: 1; }
    .header-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
    .header-btn-text { background: var(--bg-header-dark); color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; flex-shrink: 0; }
    .back-btn { background: none; border: none; color: #B5D4F4; font-size: 24px; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
    #search-bar { background: var(--bg-card); padding: 8px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    #search-input { width: 100%; padding: 8px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg-app); color: var(--text-primary); font-size: 14px; outline: none; }
    #search-input::placeholder { color: var(--text-timestamp); }
    #contact-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .contact-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg-card); cursor: pointer; }
    .contact-row:active { background: var(--row-hover); }
    .avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--accent-dark); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; font-weight: 500; color: white; }
    .avatar.alt { background: var(--avatar-alt); }
    .row-info { flex: 1; min-width: 0; }
    .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .row-name { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .row-time { font-size: 11px; color: var(--text-timestamp); flex-shrink: 0; margin-left: 6px; }
    .row-bottom { display: flex; justify-content: space-between; align-items: center; }
    .row-preview { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .unread-badge { background: var(--accent); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-left: 8px; }
    .empty-state { text-align: center; color: var(--text-secondary); margin-top: 60px; font-size: 14px; padding: 20px; line-height: 2; }
    #chat-area { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; -webkit-overflow-scrolling: touch; }
    .bubble { max-width: 82%; padding: 9px 12px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
    .bubble-original { font-size: 11px; font-style: italic; margin-bottom: 3px; }
    .bubble-translation { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .bubble-time { font-size: 10px; text-align: right; }
    .bubble-in { background: var(--bg-bubble-in); align-self: flex-start; border-bottom-left-radius: 2px; border: 0.5px solid var(--border); }
    .bubble-in .bubble-original { color: var(--text-bubble-in-original); }
    .bubble-in .bubble-translation { color: var(--text-bubble-in-translation); }
    .bubble-in .bubble-time { color: var(--text-timestamp); }
    .bubble-out { background: var(--bg-bubble-out); align-self: flex-end; border-bottom-right-radius: 2px; }
    .bubble-out .bubble-original { color: var(--text-bubble-out-original); }
    .bubble-out .bubble-translation { color: var(--text-bubble-out); }
    .bubble-out .bubble-time { color: var(--text-bubble-out-original); }
    .empty-chat { text-align: center; color: var(--text-secondary); margin-top: 40px; font-size: 14px; }
    #message-footer { background: var(--bg-input-bar); padding: 8px 12px; display: flex; gap: 8px; align-items: center; border-top: 0.5px solid var(--border); flex-shrink: 0; }
    .attach-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; padding: 0; flex-shrink: 0; line-height: 1; }
    #message-input { flex: 1; padding: 9px 14px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 15px; outline: none; background: var(--bg-input); color: var(--text-primary); }
    #message-input::placeholder { color: var(--text-timestamp); }
    #send-btn { background: var(--accent-dark); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-card); border-radius: 14px; padding: 20px; width: 90%; max-width: 400px; }
    .modal h2 { font-size: 17px; margin-bottom: 14px; color: var(--text-primary); }
    .modal-field { margin-bottom: 12px; }
    .modal-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
    .modal-input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--bg-app); color: var(--text-primary); outline: none; }
    .modal-hint { font-size: 11px; color: var(--text-timestamp); margin-top: 3px; }
    .modal-buttons { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save { flex: 1; background: var(--accent-dark); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-cancel { flex: 1; background: var(--bg-app); color: var(--text-primary); border: 0.5px solid var(--border); padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; }
    #manage-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: var(--bg-app); z-index: 200; flex-direction: column; overflow: hidden; }
    #manage-screen.active { display: flex; }
    #manage-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .contact-card { background: var(--bg-card); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--border); }
    .card-info { flex: 1; }
    .card-name { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .card-number { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; }
    .btn-edit-sm { background: var(--accent-dark); color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-del-sm { background: #c0392b; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>

<div id="list-view" class="view active">
  <div class="app-header">
    <h1>Beast Mode</h1>
    <button class="header-btn-text" id="manage-btn">Manage</button>
    <button class="header-btn" id="add-btn">+</button>
  </div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="Search contacts..." />
  </div>
  <div id="contact-list"></div>
</div>

<div id="convo-view" class="view">
  <div class="app-header">
    <button class="back-btn" id="back-btn">&#8592;</button>
    <div id="convo-avatar" class="avatar" style="width:34px;height:34px;font-size:13px;flex-shrink:0;"></div>
    <h1 id="convo-name" style="font-size:16px;"></h1>
  </div>
  <div id="chat-area"></div>
  <div id="message-footer">
    <button class="attach-btn" onclick="alert('Photo sending coming soon!')">📎</button>
    <input id="message-input" type="text" placeholder="Type in English..." />
    <button id="send-btn">&#10148;</button>
  </div>
</div>

<div id="add-modal" class="modal-overlay">
  <div class="modal">
    <h2>Add Contact</h2>
    <div class="modal-field">
      <label class="modal-label">Name</label>
      <input class="modal-input" id="new-name" type="text" placeholder="e.g. Juan Martinez" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Phone number</label>
      <input class="modal-input" id="new-number" type="tel" placeholder="+15551234567" />
      <p class="modal-hint">Include country code — US: +1, Mexico: +52</p>
    </div>
    <div class="modal-field">
      <label class="modal-label">Avatar — initials, nickname, or emoji</label>
      <input class="modal-input" id="new-avatar" type="text" placeholder="e.g. JM, Boss, 🔨, ⭐" maxlength="4" />
      <p class="modal-hint">Leave blank to use initials automatically</p>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="add-cancel">Cancel</button>
      <button class="btn-save" id="add-save">Save</button>
    </div>
  </div>
</div>

<div id="edit-modal" class="modal-overlay">
  <div class="modal">
    <h2>Edit Contact</h2>
    <div class="modal-field">
      <label class="modal-label">Name</label>
      <input class="modal-input" id="edit-name" type="text" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Phone number</label>
      <input class="modal-input" id="edit-number" type="tel" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Avatar — initials, nickname, or emoji</label>
      <input class="modal-input" id="edit-avatar" type="text" maxlength="4" />
      <p class="modal-hint">Leave blank to use initials automatically</p>
    </div>
    <div class="modal-buttons">
      <button class="btn-cancel" id="edit-cancel">Cancel</button>
      <button class="btn-save" id="edit-save">Save</button>
    </div>
  </div>
</div>

<div id="manage-screen">
  <div class="app-header">
    <button class="back-btn" id="close-manage-btn">&#8592;</button>
    <h1>Manage Contacts</h1>
  </div>
  <div id="manage-list"></div>
</div>

<script>
  let contacts = [];
  let allMessages = [];
  let lastMessageCount = 0;
  let selectedNumber = '';
  let editingOldNumber = '';
  let unreadCounts = {};

  function getInitials(name) {
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function getAvatar(contact) {
    return (contact.avatar && contact.avatar.trim()) ? contact.avatar.trim() : getInitials(contact.name);
  }

  function getContact(number) {
    return contacts.find(c => c.number === number.replace('whatsapp:', ''));
  }

  function getLastMessage(number) {
    const msgs = allMessages.filter(m =>
      (m.direction === 'IN' && m.from.replace('whatsapp:', '') === number) ||
      (m.direction === 'OUT' && m.to === number)
    );
    return msgs.length > 0 ? msgs[msgs.length - 1] : null;
  }

  function formatTime(msg) {
    if (!msg) return '';
    const today = new Date().toLocaleDateString();
    if (msg.date === today) return msg.time;
    return msg.date || '';
  }

  function showList() {
    selectedNumber = '';
    document.getElementById('list-view').classList.add('active');
    document.getElementById('convo-view').classList.remove('active');
    renderList();
  }

  function showConversation(number) {
    selectedNumber = number;
    document.getElementById('list-view').classList.remove('active');
    document.getElementById('convo-view').classList.add('active');
    const c = getContact(number);
    document.getElementById('convo-avatar').textContent = c ? getAvatar(c) : '?';
    document.getElementById('convo-name').textContent = c ? c.name : number;
    markRead(number);
    renderConversation();
  }

  function renderList() {
    const list = document.getElementById('contact-list');
    const search = document.getElementById('search-input').value.toLowerCase().trim();
    const filtered = contacts.filter(c =>
      c.name.toLowerCase().includes(search) || c.number.includes(search)
    );
    const sorted = [...filtered].sort((a, b) => {
      const mA = getLastMessage(a.number);
      const mB = getLastMessage(b.number);
      if (!mA && !mB) return 0;
      if (!mA) return 1;
      if (!mB) return -1;
      return 0;
    });
    if (sorted.length === 0) {
      list.innerHTML = '<p class="empty-state">' + (contacts.length === 0 ? 'No contacts yet.<br>Tap + to add your first contact.' : 'No contacts match your search.') + '</p>';
      return;
    }
    list.innerHTML = '';
    sorted.forEach(function(c, i) {
      const lastMsg = getLastMessage(c.number);
      const unread = unreadCounts[c.number] || 0;
      const preview = lastMsg ? (lastMsg.direction === 'IN' ? lastMsg.translated : lastMsg.original) : 'Tap to start messaging';
      const row = document.createElement('div');
      row.className = 'contact-row';
      row.innerHTML =
        '<div class="avatar ' + (i % 2 === 1 ? 'alt' : '') + '">' + getAvatar(c) + '</div>' +
        '<div class="row-info">' +
          '<div class="row-top">' +
            '<span class="row-name">' + c.name + '</span>' +
            '<span class="row-time">' + formatTime(lastMsg) + '</span>' +
          '</div>' +
          '<div class="row-bottom">' +
            '<span class="row-preview">' + preview + '</span>' +
            (unread > 0 ? '<div class="unread-badge">' + unread + '</div>' : '') +
          '</div>' +
        '</div>';
      row.addEventListener('click', function() { showConversation(c.number); });
      list.appendChild(row);
    });
  }

  function renderConversation() {
    const chat = document.getElementById('chat-area');
    const msgs = allMessages.filter(function(m) {
      return (m.direction === 'IN' && m.from.replace('whatsapp:', '') === selectedNumber) ||
             (m.direction === 'OUT' && m.to === selectedNumber);
    });
    if (msgs.length === 0) {
      chat.innerHTML = '<p class="empty-chat">No messages yet.<br>Type below to send a translated message.</p>';
      return;
    }
    chat.innerHTML = '';
    msgs.forEach(function(msg) {
      const div = document.createElement('div');
      if (msg.direction === 'IN') {
        div.className = 'bubble bubble-in';
        div.innerHTML =
          '<div class="bubble-original">' + msg.original + '</div>' +
          '<div class="bubble-translation">' + msg.translated + '</div>' +
          '<div class="bubble-time">' + msg.time + '</div>';
      } else {
        div.className = 'bubble bubble-out';
        div.innerHTML =
          '<div class="bubble-translation">' + msg.original + '</div>' +
          '<div class="bubble-original">' + msg.translated + '</div>' +
          '<div class="bubble-time">' + msg.time + ' \u2713\u2713</div>';
      }
      chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  async function loadContacts() {
    try {
      const res = await fetch('/contacts');
      contacts = await res.json();
      contacts.forEach(function(c) { if (!unreadCounts[c.number]) unreadCounts[c.number] = 0; });
      renderList();
    } catch(e) { console.error('loadContacts error', e); }
  }

  function renderManageList() {
    const list = document.getElementById('manage-list');
    if (contacts.length === 0) {
      list.innerHTML = '<p class="empty-state">No contacts yet.</p>';
      return;
    }
    list.innerHTML = '';
    contacts.forEach(function(c, i) {
      const card = document.createElement('div');
      card.className = 'contact-card';
      card.innerHTML =
        '<div class="avatar ' + (i % 2 === 1 ? 'alt' : '') + '" style="width:40px;height:40px;font-size:14px;">' + getAvatar(c) + '</div>' +
        '<div class="card-info">' +
          '<div class="card-name">' + c.name + '</div>' +
          '<div class="card-number">' + c.number + '</div>' +
        '</div>' +
        '<div class="card-actions">' +
          '<button class="btn-edit-sm" onclick="openEdit(\'' + c.name.replace(/'/g,"\\'") + '\',\'' + c.number + '\',\'' + (c.avatar||'').replace(/'/g,"\\'") + '\')">Edit</button>' +
          '<button class="btn-del-sm" onclick="deleteContact(\'' + c.number + '\',\'' + c.name.replace(/'/g,"\\'") + '\')">Delete</button>' +
        '</div>';
      list.appendChild(card);
    });
  }

  document.getElementById('add-btn').addEventListener('click', function() {
    ['new-name','new-number','new-avatar'].forEach(function(id) { document.getElementById(id).value = ''; });
    document.getElementById('add-modal').classList.add('active');
  });
  document.getElementById('add-cancel').addEventListener('click', function() { document.getElementById('add-modal').classList.remove('active'); });
  document.getElementById('add-save').addEventListener('click', async function() {
    const name = document.getElementById('new-name').value.trim();
    const number = document.getElementById('new-number').value.trim();
    const avatar = document.getElementById('new-avatar').value.trim();
    if (!name || !number) { alert('Please enter both name and phone number.'); return; }
    if (!number.startsWith('+')) { alert('Phone number must start with + and country code.'); return; }
    try {
      const res = await fetch('/contacts/add', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({name,number,avatar}) });
      const data = await res.json();
      if (data.success) {
        contacts.push({name,number,avatar});
        unreadCounts[number] = 0;
        document.getElementById('add-modal').classList.remove('active');
        renderList();
      } else { alert('Error saving contact.'); }
    } catch(e) { alert('Error saving contact.'); }
  });

  function openEdit(name, number, avatar) {
    editingOldNumber = number;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-number').value = number;
    document.getElementById('edit-avatar').value = avatar || '';
    document.getElementById('edit-modal').classList.add('active');
  }
  document.getElementById('edit-cancel').addEventListener('click', function() { document.getElementById('edit-modal').classList.remove('active'); });
  document.getElementById('edit-save').addEventListener('click', async function() {
    const name = document.getElementById('edit-name').value.trim();
    const number = document.getElementById('edit-number').value.trim();
    const avatar = document.getElementById('edit-avatar').value.trim();
    if (!name || !number) { alert('Please enter both name and phone number.'); return; }
    try {
      const res = await fetch('/contacts/edit', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({oldNumber:editingOldNumber,name,number,avatar}) });
      const data = await res.json();
      if (data.success) {
        const idx = contacts.findIndex(function(c) { return c.number === editingOldNumber; });
        if (idx !== -1) contacts[idx] = {name,number,avatar};
        document.getElementById('edit-modal').classList.remove('active');
        renderList();
        renderManageList();
      } else { alert('Error updating contact.'); }
    } catch(e) { alert('Error updating contact.'); }
  });

  async function deleteContact(number, name) {
    if (!confirm('Delete ' + name + '?')) return;
    try {
      const res = await fetch('/contacts/delete', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({number}) });
      const data = await res.json();
      if (data.success) {
        contacts = contacts.filter(function(c) { return c.number !== number; });
        renderList();
        renderManageList();
      }
    } catch(e) { alert('Error deleting contact.'); }
  }

  document.getElementById('manage-btn').addEventListener('click', function() {
    renderManageList();
    document.getElementById('manage-screen').classList.add('active');
  });
  document.getElementById('close-manage-btn').addEventListener('click', function() {
    document.getElementById('manage-screen').classList.remove('active');
  });

  async function loadMessages() {
    try {
      const res = await fetch('/messages');
      const messages = await res.json();
      if (messages.length !== lastMessageCount) {
        const newMsgs = messages.slice(lastMessageCount);
        lastMessageCount = messages.length;
        allMessages = messages;
        newMsgs.forEach(function(msg) {
          if (msg.direction === 'IN') {
            const num = msg.from.replace('whatsapp:', '');
            if (num !== selectedNumber) {
              unreadCounts[num] = (unreadCounts[num] || 0) + 1;
            }
          }
        });
        if (selectedNumber) renderConversation();
        else renderList();
      }
    } catch(e) { console.error('loadMessages error', e); }
  }

  async function markRead(number) {
    try {
      await fetch('/markread', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({number}) });
      unreadCounts[number] = 0;
      renderList();
    } catch(e) {}
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('message-input').addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });

  async function sendMessage() {
    const message = document.getElementById('message-input').value.trim();
    if (!message || !selectedNumber) {
      alert(!selectedNumber ? 'No contact selected.' : 'Please type a message.');
      return;
    }
    document.getElementById('message-input').value = '';
    document.getElementById('send-btn').disabled = true;
    try {
      await fetch('/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({to:selectedNumber,message}) });
      await loadMessages();
      document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
    } catch(e) { alert('Error sending message.'); }
    document.getElementById('send-btn').disabled = false;
  }

  document.getElementById('back-btn').addEventListener('click', showList);
  document.getElementById('search-input').addEventListener('input', renderList);

  loadContacts();
  loadMessages();
  setInterval(loadMessages, 3000);
</script>
</body>
</html>
